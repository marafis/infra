apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: strapi
spec:
  source:
    repoURL: https://github.com/marafis/marafis-infra.git
    path: infra/strapi
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: website
  syncPolicy:
    automated:
      prune: true
      selfHeal: true